name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build static site (Vite + React Router prerender)
        working-directory: web
        run: npm run build

      - name: Assemble publish directory
        run: |
          set -euo pipefail
          rm -rf _site && mkdir -p _site
          # Prerendered SPA + hashed assets + public/ files.
          rsync -a web/build/client/ _site/
          # React Router nests every prerendered route under the basename
          # (index.html, privacy/, terms/). Lift the whole subtree to the publish
          # root so GitHub Pages serves them at /nyika-expedition/*.
          cp -r _site/nyika-expedition/. _site/
          rm -rf _site/nyika-expedition
          # SPA fallback for deep links / unknown paths.
          mv _site/__spa-fallback.html _site/404.html
          # Pages must not run Jekyll over the React asset directories.
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
