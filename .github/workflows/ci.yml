name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build app (typecheck + prerender)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Typecheck
        working-directory: web
        run: npm run typecheck
      - name: Build (prerender)
        working-directory: web
        run: npm run build
      - name: Assert prerendered HTML has real content
        working-directory: web
        run: |
          set -euo pipefail
          root=build/client/nyika-expedition
          grep -q "Nyika Expeditions" "$root/index.html"
          grep -q "application/ld+json" "$root/index.html"
          grep -q "Maasai Mara" "$root/index.html"
          grep -q "Tanzania" "$root/destinations/index.html"
          grep -q "Gorilla Highlands" "$root/destinations/rwanda/index.html"
          grep -q "Twelve routes" "$root/expeditions/index.html"
          grep -q "Ngorongoro" "$root/expeditions/serengeti/index.html"
          grep -q "Okavango" "$root/expeditions/okavango/index.html"
          grep -q "Conservation" "$root/about/index.html"
          grep -q "Write to the Guild" "$root/contact/index.html"
          grep -q "Privacy Policy" "$root/privacy/index.html"
          grep -q "Booking Terms" "$root/terms/index.html"
          echo "Prerender content OK (home, destinations, expeditions, about, contact, legal)"

  audit:
    name: Lighthouse + link check (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Build (prerender)
        working-directory: web
        run: npm run build
      - name: Stage built site under the Pages subpath
        run: |
          set -euo pipefail
          rm -rf _lhstage && mkdir -p _lhstage/nyika-expedition
          rsync -a web/build/client/ _lhstage/nyika-expedition/
          cp -r _lhstage/nyika-expedition/nyika-expedition/. _lhstage/nyika-expedition/
          rm -rf _lhstage/nyika-expedition/nyika-expedition
          mv _lhstage/nyika-expedition/__spa-fallback.html _lhstage/nyika-expedition/404.html
      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: >-
            --no-progress --exclude-mail --accept 200,206,403,429
            _lhstage/nyika-expedition/index.html
            _lhstage/nyika-expedition/destinations/index.html
            _lhstage/nyika-expedition/expeditions/index.html
            _lhstage/nyika-expedition/about/index.html
            _lhstage/nyika-expedition/contact/index.html
            _lhstage/nyika-expedition/privacy/index.html
            _lhstage/nyika-expedition/terms/index.html
          fail: false
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12.6.2
        with:
          configPath: ./web/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true
